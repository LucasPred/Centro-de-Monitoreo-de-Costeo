<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAVAFILT S.A. | Centro de Monitoreo de Costos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen p-4">

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- Encabezado -->
        <div class="bg-slate-800 p-6 rounded-xl shadow-xl border border-slate-700 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-white">GRAVAFILT S.A.</h1>
                <p class="text-slate-400 text-sm">Monitoreo de Costes y Canteras - Entre Ríos / Vaca Muerta</p>
            </div>
            <span class="bg-green-500/20 text-green-400 text-xs px-3 py-1 rounded-full font-semibold border border-green-500/30">Conectado</span>
        </div>

        <!-- Panel de Acciones Rápidas -->
        <div class="bg-slate-800 p-6 rounded-xl shadow-xl border border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h2 class="text-lg font-semibold text-white">Panel Operativo</h2>
                <p class="text-slate-400 text-sm">Gestiona y visualiza los costos de extracción y fletes.</p>
            </div>
            <button onclick="agregarDatoPrueba()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-500 text-white font-medium px-4 py-2 rounded-lg text-sm transition shadow-lg">
                + Cargar Flete de Prueba
            </button>
        </div>

        <!-- Tabla de Registros -->
        <div class="bg-slate-800 rounded-xl p-6 shadow-xl border border-slate-700">
            <h2 class="text-lg font-semibold text-white mb-4">Registro Operativo de Costos</h2>
            <div id="tabla-contenido" class="overflow-x-auto">
                <p class="text-slate-400 text-sm">Cargando registros...</p>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://yfakjwuyjbshgtdfwzmj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmYWtqd3V5amJzaGd0ZGZ3em1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEyMzg3MjYsImV4cCI6MjA1NjgxNDcyNn0.V7_h1Ff7bZ-M018J2a6q2h00bF5h_X1a2b3c4d5e6f7';
        
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarCostos() {
            const contenedor = document.getElementById('tabla-contenido');
            const { data, error } = await supabaseClient.from('costos').select('*').order('id', { ascending: false });

            if (error) {
                contenedor.innerHTML = `<p class="text-red-400 text-sm">Error al cargar datos: ${error.message}</p>`;
                return;
            }

            if (!data || data.length === 0) {
                contenedor.innerHTML = `<p class="text-slate-400 text-sm">No hay registros cargados todavía. Pulsa el botón superior para agregar una prueba.</p>`;
                return;
            }

            let html = '<table class="w-full text-left border-collapse"><thead><tr class="border-b border-slate-700 text-slate-400 text-sm">';
            html += '<th class="p-3">Concepto</th><th class="p-3">Monto</th><th class="p-3">Jurisdicción</th>';
            html += '</tr></thead><tbody>';

            data.forEach(row => {
                html += `<tr class="border-b border-slate-700/50 hover:bg-slate-700/20 text-sm">`;
                html += `<td class="p-3 text-white font-medium">${row.concepto || '-'}</td>`;
                html += `<td class="p-3 text-green-400">$ ${row.monto ? Number(row.monto).toLocaleString() : '0'}</td>`;
                html += `<td class="p-3 text-slate-300">${row.jurisdiccion || '-'}</td>`;
                html += `</tr>`;
            });

            html += '</tbody></table>';
            contenedor.innerHTML = html;
        }

        async function agregarDatoPrueba() {
            const { error } = await supabaseClient.from('costos').insert([
                { concepto: 'Flete Paraná ➔ Vaca Muerta (Test)', monto: 185000, jurisdiccion: 'Entre Ríos / Neuquén' }
            ]);

            if (error) {
                alert('Error al guardar: ' + error.message);
            } else {
                cargarCostos(); // Recarga la tabla sola
            }
        }

        cargarCostos();
    </script>
</body>
</html>
