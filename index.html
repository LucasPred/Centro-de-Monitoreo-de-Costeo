<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAVAFILT S.A. | Centro de Monitoreo de Costos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-800 rounded-xl shadow-2xl overflow-hidden border border-slate-700">
        <div class="bg-slate-900 p-6 border-b border-slate-700 text-center">
            <h1 class="text-2xl font-bold text-white tracking-wide">GRAVAFILT S.A.</h1>
            <p class="text-slate-400 text-sm mt-1">Micrositio de Costeo Dinámico</p>
        </div>
        
        <div class="p-8" id="login-container">
            <h2 class="text-lg font-semibold mb-6 text-center text-blue-400">Acceso Exclusivo Directorio</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Correo Electrónico</label>
                    <input type="email" id="email" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="director@gravafilt.com">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Contraseña</label>
                    <input type="password" id="password" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="••••••••">
                </div>
                
                <button onclick="iniciarSesion()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-lg transition duration-200 mt-4 shadow-lg shadow-blue-500/30">
                    Ingresar al Sistema
                </button>
            </div>
            
            <p id="mensaje-error" class="text-red-400 text-sm mt-4 text-center hidden"></p>
        </div>

        <div class="p-8 hidden" id="dashboard-container">
            <div class="flex items-center justify-center space-x-2 text-green-400 mb-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="font-bold">Conexión Exitosa</span>
            </div>
            <p class="text-center text-sm text-slate-300">Bienvenido al Motor de Cálculo. La base de datos está enlazada correctamente.</p>
        </div>
    </div>

    <script>
        // =========================================================================
        // PASO 1: PEGA TUS LLAVES DE SUPABASE AQUÍ ABAJO
        // =========================================================================
        const supabaseUrl = 'https://yfakjwuyjbshgtdfwzmj.supabase.co';
        const supabaseKey = 'sb_publishable_qszfm0q2p-Ku11dyhOyT_g_mHdOmorF'
        
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function iniciarSesion() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('mensaje-error');
            
            errorMsg.classList.add('hidden');

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.innerText = "Error: " + error.message + " (Verifica que las credenciales o las llaves sean correctas).";
                errorMsg.classList.remove('hidden');
            } else {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('dashboard-container').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
