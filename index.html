<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAVAFILT S.A. | Análisis de Costos VNR por Granulometría</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Encabezado -->
        <div class="bg-slate-800 p-6 rounded-xl shadow-xl border border-slate-700 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white">GRAVAFILT S.A.</h1>
                <p class="text-slate-400 text-sm">Matriz de Valor Neto de Realización (VNR) y Costo Diferenciado por Malla</p>
            </div>
            <span class="bg-blue-500/20 text-blue-400 text-xs px-3 py-1 rounded-full font-semibold border border-blue-500/30">Análisis Ex Works</span>
        </div>

        <!-- Tabla VNR Completa -->
        <div class="bg-slate-800 rounded-xl p-6 shadow-xl border border-slate-700 space-y-4">
            <h2 class="text-lg font-semibold text-white">Desglose Operativo y Financiero</h2>
            
            <div id="tabla-contenido" class="overflow-x-auto">
                <p class="text-slate-400 text-sm">Cargando registros VNR desde la base de datos...</p>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://yfakjwuyjbshgtdfwzmj.supabase.co';
        const supabaseKey = sb_publishable_qszfm0q2p-Ku11dyhOyT_g_mHdOmorF;
        
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarVNR() {
            const contenedor = document.getElementById('tabla-contenido');
            const { data, error } = await supabaseClient.from('costos').select('*').order('id', { ascending: true });

            if (error) {
                contenedor.innerHTML = `<p class="text-red-400 text-sm">Error al conectar con la base de datos: ${error.message}</p>`;
                return;
            }

            if (!data || data.length === 0) {
                contenedor.innerHTML = `<p class="text-amber-400 text-sm">La tabla está lista pero no tiene datos guardados.</p>`;
                return;
            }

            let html = `
            <table class="w-full text-left border-collapse min-w-[900px]">
                <thead>
                    <tr class="border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider bg-slate-800/80">
                        <th class="p-3">Producto / Granulometría</th>
                        <th class="p-3 text-right">% Rend. Físico</th>
                        <th class="p-3 text-right">Prod. (tn/h)</th>
                        <th class="p-3 text-right">Precio Vta/tn</th>
                        <th class="p-3 text-right">Ingreso Teór. $/h</th>
                        <th class="p-3 text-right">% Part. Ingreso</th>
                        <th class="p-3 text-right">Costo Conj. $/h</th>
                        <th class="p-3 text-right text-emerald-400">Costo Real $/tn</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-700/50 text-sm">`;

            data.forEach(row => {
                html += `
                <tr class="hover:bg-slate-700/30 transition">
                    <td class="p-3 font-semibold text-white">${row.granulometria || '-'}</td>
                    <td class="p-3 text-right text-slate-300">${row.rendimiento_pct ? row.rendimiento_pct + '%' : '-'}</td>
                    <td class="p-3 text-right text-slate-300">${row.productividad_tnh ? Number(row.productividad_tnh).toLocaleString() : '-'}</td>
                    <td class="p-3 text-right text-slate-300">${row.precio_venta_tn ? '$ ' + Number(row.precio_venta_tn).toLocaleString() : '-'}</td>
                    <td class="p-3 text-right text-slate-300">${row.ingreso_teorico_hs ? '$ ' + Number(row.ingreso_teorico_hs).toLocaleString() : '-'}</td>
                    <td class="p-3 text-right text-slate-300">${row.participacion_ingreso_pct ? row.participacion_ingreso_pct + '%' : '-'}</td>
                    <td class="p-3 text-right text-slate-300">${row.costo_conjunto_asignado_hs ? '$ ' + Number(row.costo_conjunto_asignado_hs).toLocaleString() : '-'}</td>
                    <td class="p-3 text-right font-bold text-emerald-400">${row.costo_unitario_real_tn ? '$ ' + Number(row.costo_unitario_real_tn).toLocaleString() : '-'}</td>
                </tr>`;
            });

            html += `</tbody></table>`;
            contenedor.innerHTML = html;
        }

        cargarVNR();
    </script>
</body>
</html>
